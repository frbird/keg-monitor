# When Test is merged to main: build Docker image and publish as artifact
name: Build Docker (main)

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: keg-monitor:latest

      - name: Export image to tarball
        run: docker save keg-monitor:latest -o keg-monitor.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: keg-monitor-docker-image
          path: keg-monitor.tar
